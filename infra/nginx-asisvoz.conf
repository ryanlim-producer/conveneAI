server {
  server_name 5.223.84.152.sslip.io;
  client_max_body_size 500M;

  # /blog — static blog files
  location /blog {
    alias /srv/blog;
    index index.html;
    try_files $uri $uri/ $uri.html =404;
  }

  # /conveneai — the main Next.js app
  location /conveneai/api/queue {
    proxy_pass http://localhost:3000/conveneai/api/queue;
    proxy_buffering off;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_read_timeout 24h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /conveneai {
    proxy_pass http://localhost:3000;
    proxy_read_timeout 24h;
    client_body_timeout 24h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Root — server catalogue
  location / {
    root /srv/www;
    index index.html;
    try_files $uri $uri/ =404;
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/5.223.84.152.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/5.223.84.152.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = 5.223.84.152.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name 5.223.84.152.sslip.io;
    return 404; # managed by Certbot


}
