server {
  server_name 5.223.84.152.sslip.io;
  client_max_body_size 500M;

  # /conveneai — the main Next.js app
  location /conveneai/api/queue {
    proxy_pass http://localhost:3000/conveneai/api/queue;
    proxy_buffering off;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_read_timeout 24h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /conveneai {
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Root now free for other services (set your own proxy_pass or root here)
  location / {
    return 200 "root free — add your own service here";
    add_header Content-Type text/plain;
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/5.223.84.152.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/5.223.84.152.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = 5.223.84.152.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name 5.223.84.152.sslip.io;
    return 404; # managed by Certbot


}
